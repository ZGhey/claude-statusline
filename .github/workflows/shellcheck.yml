name: shellcheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # shellcheck is preinstalled on GitHub's ubuntu runners.
      - name: Lint shell scripts
        run: shellcheck -s sh statusline-command.sh install.sh
